name: Deploy Portfolio

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Oracle VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}

          script: |
            set -e

            if [ ! -d ~/portfolio ]; then
              git clone https://github.com/laladwesh/own.git ~/portfolio
            fi
            cd ~/portfolio
            echo "Pulling latest changes..."
            git fetch origin
            git reset --hard origin/master
            git clean -fd

            echo "Writing env file..."
            echo "VITE_GH_TOKEN=${{ secrets.VITE_GH_TOKEN }}" > .env

            echo "Installing dependencies..."
            npm install

            echo "Building..."
            npm run build

            echo "Restarting PM2 server on port 6012..."
            pm2 describe portfolio > /dev/null 2>&1 \
              && pm2 reload portfolio \
              || pm2 serve dist 6012 --spa --name portfolio
            pm2 save

            echo "Deployment completed successfully!"
